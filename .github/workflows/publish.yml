name: npm publish

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      id-token: write

    steps:
    - uses: actions/checkout@v4

    # 移除 registry-url，單純使用 setup-node 準備 Node 環境
    - uses: actions/setup-node@v4
      with:
        node-version: '20.x' 

    - run: npm install

    # OIDC 和 provenance 會自動向官方 Registry 要權限
    - run: npm publish --provenance